name: Forecast on election questions
on:
  workflow_dispatch:
  schedule:
    - cron: "0 13 * * *" # once a day at 13:00 UTC; skip-already-forecasted keeps cost low
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false
jobs:
  forecast_job:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install poetry
        uses: snok/install-poetry@v1
        with:
          virtualenvs-create: true
          virtualenvs-in-project: true
          installer-parallel: true
      - name: Install dependencies
        run: poetry install --no-interaction --no-root
      - name: Run election bot
        run: |
          poetry run python run_elections.py
        env:
          METACULUS_TOKEN: ${{ secrets.METACULUS_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.SPARKY_CLAUDE }}
